<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Claude Code 用量</title>
<!-- PWA：加入主畫面後全螢幕 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CC 用量">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0b0b0d">
<style>
  :root {
    --bg: #0b0b0d;
    --card: #18181c;
    --card2: #1f1f25;
    --track: #2c2c33;
    --line: rgba(255,255,255,.07);
    --text: #f4f4f7;
    --muted: #9a9aa2;
    --orange: #ff9c33;
    --orange2: #ff7a1a;
    --teal: #3cc5ae;
    --red: #ff453a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background:
      radial-gradient(1200px 620px at 82% -12%, rgba(255,156,51,.12), transparent 58%),
      radial-gradient(1000px 520px at -12% 8%, rgba(60,197,174,.09), transparent 55%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: -apple-system, "SF Pro Text", "PingFang TC", "Microsoft JhengHei", sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: max(20px, env(safe-area-inset-top)) 16px 40px;
    transition: filter .4s;
  }
  body.stale { filter: saturate(.3) brightness(.92); }
  header {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 920px; margin: 4px auto 20px; padding: 0 4px;
  }
  header h1 {
    font-size: 20px; font-weight: 800; letter-spacing: -.01em;
    display: flex; align-items: center; gap: 9px;
  }
  header h1 .logo {
    width: 24px; height: 24px; border-radius: 8px;
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    box-shadow: 0 4px 14px rgba(255,122,26,.45);
  }
  #meta { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  #meta .stale-flag { color: var(--red); font-weight: 700; margin-left: 6px; }

  #content {
    max-width: 920px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr; gap: 16px;
  }
  @media (min-width: 760px) { #content { grid-template-columns: 1fr 1fr; align-items: start; } }
  .machine { min-width: 0; }
  .card {
    background: linear-gradient(180deg, var(--card2), var(--card));
    border-radius: 22px;
    padding: 20px;
    border: 1px solid var(--line);
    box-shadow: 0 12px 32px rgba(0,0,0,.38);
  }
  .card.active {
    border-color: rgba(255,156,51,.45);
    box-shadow: 0 12px 32px rgba(0,0,0,.38), 0 0 0 1px rgba(255,156,51,.2), 0 10px 44px rgba(255,122,26,.16);
  }
  .chead { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
  .cmeta { min-width: 0; }
  .ctitle {
    font-size: 16px; font-weight: 800; letter-spacing: -.01em;
    display: flex; align-items: center; gap: 8px;
  }
  .ctitle .dot {
    width: 9px; height: 9px; border-radius: 50%; flex: none;
    background: var(--orange); box-shadow: 0 0 10px rgba(255,156,51,.85);
  }
  .ctitle.stale .dot { background: var(--muted); box-shadow: none; }
  .ctitle .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ctitle .badge {
    font-size: 10px; font-weight: 800; color: #15151a; flex: none;
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    border-radius: 999px; padding: 2px 8px;
  }
  .csub { font-size: 12px; color: var(--muted); margin-top: 5px; }

  /* 主角：5hr 大數字 + 週額度圓環 */
  .hero { display: flex; align-items: center; gap: 16px; flex: none; }
  .big-wrap { text-align: center; line-height: 1; }
  .big { font-size: 38px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .big i { font-size: 18px; font-weight: 700; font-style: normal; color: var(--muted); margin-left: 2px; }
  .big-cap { display: block; font-size: 10px; color: var(--muted); margin-top: 6px; letter-spacing: .1em; }
  /* 圓環 gauge：週額度 */
  .ring {
    width: 72px; height: 72px; border-radius: 50%; flex: none;
    display: grid; place-items: center; position: relative;
    background: conic-gradient(var(--rc) calc(var(--pct) * 1%), var(--track) 0);
  }
  .ring::after {
    content: ""; position: absolute; inset: 6px; border-radius: 50%;
    background: linear-gradient(180deg, var(--card2), var(--card));
  }
  .ring-in { position: relative; z-index: 1; text-align: center; line-height: 1; }
  .ring-val { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .ring-val i { font-size: 11px; font-weight: 700; font-style: normal; color: var(--muted); margin-left: 1px; }
  .ring-cap { display: block; font-size: 9px; color: var(--muted); margin-top: 3px; letter-spacing: .1em; }

  .bars { margin-top: 18px; display: grid; gap: 13px; }
  .row .label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-bottom: 6px;
  }
  .row .label b { font-weight: 800; font-variant-numeric: tabular-nums; }
  .bar { height: 8px; border-radius: 999px; background: var(--track); overflow: hidden; }
  .bar > div {
    height: 100%; border-radius: 999px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.28);
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }

  .pills { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    font-size: 12px; color: var(--muted);
    background: rgba(255,255,255,.05); border: 1px solid var(--line);
    border-radius: 999px; padding: 6px 12px;
  }
  .pill b { color: var(--text); font-weight: 700; }

  .extra { margin-top: 12px; font-size: 12px; color: var(--muted); }
  .burn { margin-top: 13px; font-size: 13px; font-weight: 600; }
  .burn.hot {
    color: var(--orange); background: rgba(255,156,51,.12);
    border: 1px solid rgba(255,156,51,.22); border-radius: 12px; padding: 10px 12px;
  }
  .burn.cool { color: var(--muted); font-weight: 400; }

  .chart-wrap { margin-top: 18px; }
  .chart-wrap .label {
    font-size: 11px; color: var(--muted); margin-bottom: 6px;
    display: flex; gap: 14px; align-items: center;
  }
  .chart-wrap .label .k5::before,
  .chart-wrap .label .k7::before {
    content: ""; display: inline-block;
    width: 14px; height: 3px; border-radius: 2px;
    margin-right: 5px; vertical-align: middle;
  }
  .chart-wrap .label .k5::before { background: var(--orange); }
  .chart-wrap .label .k7::before { background: var(--teal); }
  .chart-wrap .label .spacer { margin-left: auto; }
  svg.chart { width: 100%; height: 96px; display: block; }
  #empty {
    max-width: 560px; margin: 60px auto; text-align: center;
    color: var(--muted); font-size: 14px; line-height: 1.6;
  }
</style>
</head>
<body>
<header>
  <h1><span class="logo"></span>Claude Code 用量</h1>
  <div id="meta">載入中…</div>
</header>
<main id="content"></main>
<div id="empty" hidden>尚無資料 — 請確認 GIST_RAW_URL 已設定且 agent 已執行過。</div>

<script>
// ===== 改成你的 Gist raw 連結 =====
const GIST_RAW_URL = "https://gist.githubusercontent.com/zhcknck/9585fb88cf03a9982de3e2b9b2fc0299/raw/usage.json";
const STALE_MINUTES = 20;
const REFRESH_MS = 60 * 1000;   // 每 60 秒刷新
const CHART_HOURS = 24;         // 走勢圖視窗
// ==================================

const HISTORY_RAW_URL = GIST_RAW_URL.replace(/usage\.json$/, "history.json");

function toneVar(pct) {
  if (pct == null) return "var(--muted)";
  if (pct >= 90) return "var(--red)";
  return "var(--orange)";   // 橘色主題：未爆統一橘、滿 90 轉紅
}

function shortName(machine) {
  const m = String(machine || "");
  const i = m.indexOf("·");
  return i >= 0 ? m.slice(i + 1) : (m || "未知");
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function relTime(iso) {
  if (!iso) return "--";
  const mins = Math.max(0, Math.floor((new Date(iso).getTime() - Date.now()) / 60000));
  if (mins < 60) return mins + "m";
  const h = Math.floor(mins / 60), m = mins % 60;
  if (mins < 1440) return m ? h + "h" + m + "m" : h + "h";
  const d = Math.floor(h / 24), hr = h % 24;
  return hr ? d + "d" + hr + "h" : d + "d";
}

function hhmm(iso) {
  const d = new Date(iso);
  if (!isFinite(d.getTime())) return "--:--";
  return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
}

function pctOf(block) {
  return block && typeof block.pct === "number" ? block.pct : null;
}

function isStale(p) {
  if (!p) return true;
  if (p.stale === true) return true;
  const t = new Date(p.updated_at).getTime();
  return !isFinite(t) || Date.now() - t > STALE_MINUTES * 60000;
}

function barRow(label, pct, color) {
  const width = Math.min(100, pct == null ? 0 : pct);
  return `
    <div class="row">
      <div class="label"><span>${label}</span><b style="color:${color}">${pct == null ? "--" : Math.round(pct)}%</b></div>
      <div class="bar"><div style="width:${width}%;background:${color}"></div></div>
    </div>`;
}

// ---- 走勢圖（inline SVG，無框架）----
function chartStart(points) {
  // x 軸起點：資料夠久取 24h，不夠就從第一筆開始（避免線全擠在右邊）
  const t0 = Date.now() - CHART_HOURS * 3600 * 1000;
  return points.length ? Math.max(t0, points[0].t) : t0;
}

function chartSvg(points) {
  // points: [{t: ms, h5, d7}] 已按時間排序
  // 只畫「週額度 d7」：它只緩慢爬升、每週才重置，線乾淨且能看出「這週會不會爆」。
  // 5hr 每 5 小時歸零一次是鋸齒狀，畫成走勢圖只會雜亂，故不畫（當前值已用大數字／圓環／燒速率呈現）。
  const W = 320, H = 96, PAD = 6;
  const now = Date.now();
  const t0 = chartStart(points);
  const span = Math.max(now - t0, 60000);
  const x = (t) => PAD + ((t - t0) / span) * (W - PAD * 2);
  const y = (pct) => H - PAD - (Math.min(100, Math.max(0, pct)) / 100) * (H - PAD * 2);

  const pts = points.filter(p => typeof p.d7 === "number" && p.t >= t0);
  if (pts.length < 2) return "";
  // 只在週重置斷崖（驟降 >10%）斷線；時間空窗不斷（週額度在空窗期間不變，連起來反而乾淨）
  const segs = []; let cur = [], prev = null;
  for (const p of pts) {
    if (prev && prev.d7 - p.d7 > 10 && cur.length) { segs.push(cur); cur = []; }
    cur.push(p); prev = p;
  }
  if (cur.length) segs.push(cur);
  const valid = segs.filter(s => s.length >= 2);
  if (!valid.length) return "";

  const linePath = valid.map(s =>
    "M" + s.map(p => x(p.t).toFixed(1) + " " + y(p.d7).toFixed(1)).join(" L")).join(" ");
  const areaPath = valid.map(s =>
    "M" + x(s[0].t).toFixed(1) + " " + (H - PAD).toFixed(1) +
    " L" + s.map(p => x(p.t).toFixed(1) + " " + y(p.d7).toFixed(1)).join(" L") +
    " L" + x(s[s.length - 1].t).toFixed(1) + " " + (H - PAD).toFixed(1) + " Z").join(" ");
  const grid = (pct) =>
    `<line x1="${PAD}" y1="${y(pct)}" x2="${W - PAD}" y2="${y(pct)}"
       stroke="rgba(255,255,255,.08)" stroke-width="1" stroke-dasharray="1 6" vector-effect="non-scaling-stroke"/>`;
  // vector-effect=non-scaling-stroke：SVG 被橫向拉伸時線寬仍維持一致，不會被壓扁
  return `
    <svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="fillwk" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="var(--teal)" stop-opacity=".34"/>
          <stop offset="1" stop-color="var(--teal)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${grid(50)}${grid(90)}
      <path d="${areaPath}" fill="url(#fillwk)" stroke="none"/>
      <path d="${linePath}" fill="none" stroke="var(--teal)" stroke-width="3"
        stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    </svg>`;
}

// ---- 燒速率：以最近 60 分鐘的 5hr% 做線性擬合（只取本視窗的點，避免跨重置斷崖失真）----
function burnLine(points, currentP5, resetsAt) {
  const winStart = resetsAt ? new Date(resetsAt).getTime() - 5 * 3600 * 1000 : -Infinity;
  const cutoff = Math.max(Date.now() - 60 * 60 * 1000, winStart);
  const pts = points.filter(p => p.t >= cutoff && typeof p.h5 === "number");
  if (pts.length < 3 || currentP5 == null) return "";
  if (currentP5 >= 99.5) return `<div class="burn hot">🔥 已達 5hr 上限，等待重置</div>`;
  const n = pts.length;
  const mx = pts.reduce((s, p) => s + p.t, 0) / n;
  const my = pts.reduce((s, p) => s + p.h5, 0) / n;
  let num = 0, den = 0;
  for (const p of pts) { num += (p.t - mx) * (p.h5 - my); den += (p.t - mx) ** 2; }
  if (!den) return "";
  const slopePerMin = (num / den) * 60000; // %/分鐘
  if (slopePerMin < 0.05) return `<div class="burn cool">近一小時用量平穩</div>`;
  const etaMin = (100 - currentP5) / slopePerMin;
  const resetMin = resetsAt ? (new Date(resetsAt).getTime() - Date.now()) / 60000 : Infinity;
  const fmt = (m) => m < 60 ? Math.round(m) + "m" : Math.floor(m / 60) + "h" + Math.round(m % 60) + "m";
  if (etaMin >= resetMin) {
    return `<div class="burn cool">照此速度，本視窗重置前不會達上限</div>`;
  }
  return `<div class="burn hot">🔥 照此速度約 ${fmt(etaMin)} 後達 5hr 上限</div>`;
}

// ---- 週額度耗盡預測：近 24h 的 7日% 線性擬合（同樣只取本視窗的點）----
function weeklyForecast(points, currentP7, resetsAt) {
  if (currentP7 == null || !resetsAt) return "";
  const end = new Date(resetsAt).getTime();
  if (!isFinite(end)) return "";
  const cutoff = Math.max(Date.now() - 24 * 3600 * 1000, end - 7 * 24 * 3600 * 1000);
  const pts = points.filter(p => p.t >= cutoff && typeof p.d7 === "number");
  if (pts.length < 5) return "";
  const n = pts.length;
  const mx = pts.reduce((s, p) => s + p.t, 0) / n;
  const my = pts.reduce((s, p) => s + p.d7, 0) / n;
  let num = 0, den = 0;
  for (const p of pts) { num += (p.t - mx) * (p.d7 - my); den += (p.t - mx) ** 2; }
  if (!den) return "";
  const slopePerDay = (num / den) * 86400000; // %/天
  if (slopePerDay < 1) return ""; // 每天爬不到 1% 不值得預測
  const etaDays = (100 - currentP7) / slopePerDay;
  const resetDays = (end - Date.now()) / 86400000;
  if (etaDays >= resetDays) return "";
  const fmtD = d => d < 1 ? Math.round(d * 24) + "h" : (Math.round(d * 10) / 10) + "d";
  return `<div class="burn hot">📅 照此速度，週額度約 ${fmtD(etaDays)} 後耗盡（距重置還有 ${fmtD(resetDays)}）</div>`;
}

function extraLine(p) {
  const ex = p.extra_usage;
  if (!ex || typeof ex !== "object") return "";
  // is_enabled/enabled 為 false 純屬噪音，不顯示
  const parts = Object.entries(ex)
    .filter(([k, v]) => !((k === "is_enabled" || k === "enabled") && v === false))
    .map(([k, v]) => `${esc(k)}: ${esc(v)}`);
  if (!parts.length) return "";
  return `<div class="extra">Extra usage — ${parts.join(" · ")}</div>`;
}

function renderPayload(p, history) {
  const cc = p.claude_code;
  if (!cc) return "";
  const p5 = pctOf(cc.five_hour);
  const p7 = pctOf(cc.seven_day);
  const stale = isStale(p);

  const points = history
    .filter(e => e && e.m === p.machine && typeof e.t === "string")
    .map(e => ({ t: new Date(e.t).getTime(), h5: e.h5, d7: e.d7 }))
    .filter(e => isFinite(e.t))
    .sort((a, b) => a.t - b.t);

  const active = p.active === true && !stale;
  const sub = stale
    ? "資料過期 " + hhmm(p.updated_at) + (p.stale_reason ? " · " + esc(p.stale_reason) : "")
    : (p5 != null && p5 >= 99.5 ? "5hr 已達上限 · 等待重置" : "5hr 額度 · 進行中");

  const wkPct = p7 == null ? 0 : Math.max(0, Math.min(100, Math.round(p7)));
  let card = `
    <div class="card${active ? " active" : ""}">
      <div class="chead">
        <div class="cmeta">
          <div class="ctitle${stale ? " stale" : ""}">
            <span class="dot"></span><span class="name">${esc(shortName(p.machine))}</span>${active ? '<span class="badge">使用中</span>' : ""}
          </div>
          <div class="csub">${sub}</div>
        </div>
        <div class="hero">
          <div class="ring" style="--pct:${wkPct};--rc:var(--teal)">
            <div class="ring-in">
              <div class="ring-val">${p7 == null ? "--" : Math.round(p7)}<i>%</i></div>
              <div class="ring-cap">WK</div>
            </div>
          </div>
          <div class="big-wrap">
            <span class="big" style="color:${toneVar(p5)}">${p5 == null ? "--" : Math.round(p5)}<i>%</i></span>
            <span class="big-cap">5HR</span>
          </div>
        </div>
      </div>
      <div class="bars">
        ${barRow("5hr", p5, toneVar(p5))}`;
  for (const [key, label] of [["seven_day_opus", "Weekly · Opus"], ["seven_day_sonnet", "Weekly · Sonnet"]]) {
    const pct = pctOf(cc[key]);
    if (pct != null) card += barRow(label, pct, "var(--teal)");
  }
  card += `
      </div>
      <div class="pills">
        <span class="pill">5hr 重置 <b>${relTime(cc.five_hour && cc.five_hour.resets_at)}</b></span>
        <span class="pill">7日 重置 <b>${relTime(cc.seven_day && cc.seven_day.resets_at)}</b></span>
      </div>
      ${stale ? "" : burnLine(points, p5, cc.five_hour && cc.five_hour.resets_at)}
      ${stale ? "" : weeklyForecast(points, p7, cc.seven_day && cc.seven_day.resets_at)}
      ${extraLine(p)}`;
  if (points.length >= 2) {
    const chartHrs = Math.max(1, Math.round((Date.now() - chartStart(points)) / 3600000));
    card += `
      <div class="chart-wrap">
        <div class="label"><span class="k7">週額度走勢</span><span class="spacer">近 ${chartHrs}h</span></div>
        ${chartSvg(points)}
      </div>`;
  }
  card += `</div>`;

  return `<section class="machine">${card}</section>`;
}

async function fetchJson(url) {
  try {
    const res = await fetch(url + "?t=" + Date.now(), { cache: "no-store" });
    if (res.ok) return await res.json();
  } catch (e) { /* 保留上次畫面 */ }
  return null;
}

async function refresh() {
  const meta = document.getElementById("meta");
  const content = document.getElementById("content");
  const empty = document.getElementById("empty");

  if (GIST_RAW_URL.indexOf("<user>") !== -1) {
    empty.hidden = false;
    empty.textContent = "請先編輯 index.html，把 GIST_RAW_URL 改成你的 Gist raw 連結。";
    meta.textContent = "未設定";
    return;
  }

  const [data, hist] = await Promise.all([
    fetchJson(GIST_RAW_URL),
    fetchJson(HISTORY_RAW_URL),
  ]);
  const history = Array.isArray(hist) ? hist : [];

  let payloads = [];
  if (Array.isArray(data)) payloads = data.filter(p => p && p.claude_code !== undefined);
  else if (data && data.claude_code !== undefined) payloads = [data];

  if (!payloads.length) {
    if (!content.innerHTML) { empty.hidden = false; meta.textContent = "無資料"; }
    return;
  }
  empty.hidden = true;

  // 排序：使用中優先，其次 5hr% 高的（用最兇的）在前
  const p5v = (p) => { const v = p.claude_code && p.claude_code.five_hour && p.claude_code.five_hour.pct; return typeof v === "number" ? v : -1; };
  payloads.sort((a, b) =>
    (b.active === true) - (a.active === true) || p5v(b) - p5v(a));
  content.innerHTML = payloads.map(p => renderPayload(p, history)).join("");

  const stale = payloads.every(isStale);
  document.body.classList.toggle("stale", stale);
  meta.innerHTML = "最後更新 " + hhmm(payloads[0].updated_at) +
    (stale ? '<span class="stale-flag">資料過期</span>' : "");
}

refresh();
// 分頁在背景時暫停輪詢，切回前景立即刷新
setInterval(() => { if (!document.hidden) refresh(); }, REFRESH_MS);
document.addEventListener("visibilitychange", () => { if (!document.hidden) refresh(); });

// PWA 離線殼層（GitHub Pages 上才會註冊；本地 file:// 不支援，不影響）
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
</html>
