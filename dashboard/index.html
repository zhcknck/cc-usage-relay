<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Claude Code 用量</title>
<!-- PWA：加入主畫面後全螢幕 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CC 用量">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0d0d0f">
<style>
  :root {
    --bg: #0d0d0f;
    --card: #1c1c1e;
    --track: #3a3a3c;
    --text: #f2f2f7;
    --muted: #98989f;
    --green: #30d158;
    --orange: #ff9f0a;
    --red: #ff453a;
    --weekly: #6e8cae;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "SF Pro Text", "PingFang TC", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
    padding: max(16px, env(safe-area-inset-top)) 16px 32px;
    transition: filter .4s;
  }
  body.stale { filter: saturate(.25); }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    max-width: 560px;
    margin: 0 auto 18px;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  #meta { font-size: 12px; color: var(--muted); }
  #meta .stale-flag { color: var(--red); font-weight: 700; margin-left: 6px; }
  .machine { max-width: 560px; margin: 0 auto 14px; }
  .machine h2 {
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }
  .machine h2 .mstale { color: var(--red); font-size: 11px; }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .card .top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .card .name { font-size: 14px; font-weight: 600; }
  .card .big { font-size: 34px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .row { margin-top: 10px; }
  .row .label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .bar {
    height: 6px;
    border-radius: 3px;
    background: var(--track);
    overflow: hidden;
  }
  .bar > div { height: 100%; border-radius: 3px; transition: width .5s; }
  .resets, .extra {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .burn { margin-top: 8px; font-size: 12px; font-weight: 600; }
  .burn.hot { color: var(--orange); }
  .burn.cool { color: var(--muted); font-weight: 400; }
  .chart-wrap { margin-top: 14px; }
  .chart-wrap .label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    gap: 12px;
  }
  .chart-wrap .label .k5::before,
  .chart-wrap .label .k7::before {
    content: "";
    display: inline-block;
    width: 14px; height: 3px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .chart-wrap .label .k5::before { background: var(--green); }
  .chart-wrap .label .k7::before { background: var(--weekly); }
  svg.chart { width: 100%; height: 84px; display: block; }
  #empty {
    max-width: 560px;
    margin: 40px auto;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>
<header>
  <h1>Claude Code 用量</h1>
  <div id="meta">載入中…</div>
</header>
<main id="content"></main>
<div id="empty" hidden>尚無資料 — 請確認 GIST_RAW_URL 已設定且 agent 已執行過。</div>

<script>
// ===== 改成你的 Gist raw 連結 =====
const GIST_RAW_URL = "https://gist.githubusercontent.com/<user>/<id>/raw/usage.json";
const STALE_MINUTES = 20;
const REFRESH_MS = 60 * 1000;   // 每 60 秒刷新
const CHART_HOURS = 24;         // 走勢圖視窗
// ==================================

const HISTORY_RAW_URL = GIST_RAW_URL.replace(/usage\.json$/, "history.json");

function toneVar(pct) {
  if (pct == null) return "var(--muted)";
  if (pct >= 90) return "var(--red)";
  if (pct >= 70) return "var(--orange)";
  return "var(--green)";
}

function relTime(iso) {
  if (!iso) return "--";
  const mins = Math.max(0, Math.floor((new Date(iso).getTime() - Date.now()) / 60000));
  if (mins < 60) return mins + "m";
  const h = Math.floor(mins / 60), m = mins % 60;
  if (mins < 1440) return m ? h + "h" + m + "m" : h + "h";
  const d = Math.floor(h / 24), hr = h % 24;
  return hr ? d + "d" + hr + "h" : d + "d";
}

function hhmm(iso) {
  const d = new Date(iso);
  if (!isFinite(d.getTime())) return "--:--";
  return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
}

function pctOf(block) {
  return block && typeof block.pct === "number" ? block.pct : null;
}

function isStale(p) {
  if (!p) return true;
  if (p.stale === true) return true;
  const t = new Date(p.updated_at).getTime();
  return !isFinite(t) || Date.now() - t > STALE_MINUTES * 60000;
}

function barRow(label, pct, color) {
  const width = Math.min(100, pct == null ? 0 : pct);
  return `
    <div class="row">
      <div class="label"><span>${label}</span><span>${pct == null ? "--" : Math.round(pct)}%</span></div>
      <div class="bar"><div style="width:${width}%;background:${color}"></div></div>
    </div>`;
}

// ---- 走勢圖（inline SVG，無框架）----
function chartSvg(points) {
  // points: [{t: ms, h5, d7}] 已按時間排序
  const W = 320, H = 84, PAD = 4;
  const now = Date.now();
  const t0 = now - CHART_HOURS * 3600 * 1000;
  const x = (t) => PAD + ((t - t0) / (now - t0)) * (W - PAD * 2);
  const y = (pct) => H - PAD - (Math.min(100, Math.max(0, pct)) / 100) * (H - PAD * 2);
  const line = (key) => {
    const pts = points.filter(p => typeof p[key] === "number");
    if (pts.length < 2) return "";
    return pts.map((p, i) => (i ? "L" : "M") + x(p.t).toFixed(1) + " " + y(p[key]).toFixed(1)).join(" ");
  };
  const grid = (pct, dash) =>
    `<line x1="${PAD}" y1="${y(pct)}" x2="${W - PAD}" y2="${y(pct)}"
       stroke="#3a3a3c" stroke-width="1" stroke-dasharray="${dash}"/>`;
  const p5 = line("h5"), p7 = line("d7");
  return `
    <svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      ${grid(70, "2 4")}${grid(90, "2 4")}
      ${p7 ? `<path d="${p7}" fill="none" stroke="var(--weekly)" stroke-width="1.5" opacity=".7"/>` : ""}
      ${p5 ? `<path d="${p5}" fill="none" stroke="var(--green)" stroke-width="2"/>` : ""}
    </svg>`;
}

// ---- 燒速率：以最近 60 分鐘的 5hr% 做線性擬合 ----
function burnLine(points, currentP5, resetsAt) {
  const cutoff = Date.now() - 60 * 60 * 1000;
  const pts = points.filter(p => p.t >= cutoff && typeof p.h5 === "number");
  if (pts.length < 3 || currentP5 == null) return "";
  const n = pts.length;
  const mx = pts.reduce((s, p) => s + p.t, 0) / n;
  const my = pts.reduce((s, p) => s + p.h5, 0) / n;
  let num = 0, den = 0;
  for (const p of pts) { num += (p.t - mx) * (p.h5 - my); den += (p.t - mx) ** 2; }
  if (!den) return "";
  const slopePerMin = (num / den) * 60000; // %/分鐘
  if (slopePerMin < 0.05) return `<div class="burn cool">近一小時用量平穩</div>`;
  const etaMin = (100 - currentP5) / slopePerMin;
  const resetMin = resetsAt ? (new Date(resetsAt).getTime() - Date.now()) / 60000 : Infinity;
  const fmt = (m) => m < 60 ? Math.round(m) + "m" : Math.floor(m / 60) + "h" + Math.round(m % 60) + "m";
  if (etaMin >= resetMin) {
    return `<div class="burn cool">照此速度，本視窗重置前不會達上限</div>`;
  }
  return `<div class="burn hot">🔥 照此速度約 ${fmt(etaMin)} 後達 5hr 上限</div>`;
}

function extraLine(p) {
  const ex = p.extra_usage;
  if (!ex || typeof ex !== "object" || !Object.keys(ex).length) return "";
  const parts = Object.entries(ex).map(([k, v]) => `${k}: ${v}`);
  return `<div class="extra">Extra usage — ${parts.join(" · ")}</div>`;
}

function renderPayload(p, history) {
  const cc = p.claude_code;
  if (!cc) return "";
  const p5 = pctOf(cc.five_hour);
  const p7 = pctOf(cc.seven_day);
  const stale = isStale(p);

  const points = history
    .filter(e => e && e.m === p.machine && typeof e.t === "string")
    .map(e => ({ t: new Date(e.t).getTime(), h5: e.h5, d7: e.d7 }))
    .filter(e => isFinite(e.t))
    .sort((a, b) => a.t - b.t);

  let card = `
    <div class="card">
      <div class="top">
        <span class="name">Claude Code</span>
        <span class="big" style="color:${toneVar(p5)}">${p5 == null ? "--" : Math.round(p5)}%</span>
      </div>
      ${barRow("5hr", p5, toneVar(p5))}
      ${barRow("Weekly", p7, "var(--weekly)")}`;
  for (const [key, label] of [["seven_day_opus", "Weekly · Opus"], ["seven_day_sonnet", "Weekly · Sonnet"]]) {
    const pct = pctOf(cc[key]);
    if (pct != null) card += barRow(label, pct, "var(--weekly)");
  }
  card += `
      <div class="resets">5hr 重置於 ${relTime(cc.five_hour && cc.five_hour.resets_at)} ·
        7日 重置於 ${relTime(cc.seven_day && cc.seven_day.resets_at)}</div>
      ${stale ? "" : burnLine(points, p5, cc.five_hour && cc.five_hour.resets_at)}
      ${extraLine(p)}`;
  if (points.length >= 2) {
    card += `
      <div class="chart-wrap">
        <div class="label"><span class="k5">5hr</span><span class="k7">Weekly</span><span>近 ${CHART_HOURS}h</span></div>
        ${chartSvg(points)}
      </div>`;
  }
  card += `</div>`;

  return `
    <section class="machine">
      <h2><span>${p.machine || "未知機器"}</span>${stale ? '<span class="mstale">過期 ' + hhmm(p.updated_at) + "</span>" : ""}</h2>
      ${card}
    </section>`;
}

async function fetchJson(url) {
  try {
    const res = await fetch(url + "?t=" + Date.now(), { cache: "no-store" });
    if (res.ok) return await res.json();
  } catch (e) { /* 保留上次畫面 */ }
  return null;
}

async function refresh() {
  const meta = document.getElementById("meta");
  const content = document.getElementById("content");
  const empty = document.getElementById("empty");

  if (GIST_RAW_URL.indexOf("<user>") !== -1) {
    empty.hidden = false;
    empty.textContent = "請先編輯 index.html，把 GIST_RAW_URL 改成你的 Gist raw 連結。";
    meta.textContent = "未設定";
    return;
  }

  const [data, hist] = await Promise.all([
    fetchJson(GIST_RAW_URL),
    fetchJson(HISTORY_RAW_URL),
  ]);
  const history = Array.isArray(hist) ? hist : [];

  let payloads = [];
  if (Array.isArray(data)) payloads = data.filter(p => p && p.claude_code !== undefined);
  else if (data && data.claude_code !== undefined) payloads = [data];

  if (!payloads.length) {
    if (!content.innerHTML) { empty.hidden = false; meta.textContent = "無資料"; }
    return;
  }
  empty.hidden = true;

  payloads.sort((a, b) => new Date(b.updated_at || 0) - new Date(a.updated_at || 0));
  content.innerHTML = payloads.map(p => renderPayload(p, history)).join("");

  const stale = payloads.every(isStale);
  document.body.classList.toggle("stale", stale);
  meta.innerHTML = "最後更新 " + hhmm(payloads[0].updated_at) +
    (stale ? '<span class="stale-flag">資料過期</span>' : "");
}

refresh();
// 分頁在背景時暫停輪詢，切回前景立即刷新
setInterval(() => { if (!document.hidden) refresh(); }, REFRESH_MS);
document.addEventListener("visibilitychange", () => { if (!document.hidden) refresh(); });

// PWA 離線殼層（GitHub Pages 上才會註冊；本地 file:// 不支援，不影響）
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
</html>
