<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Claude Code 用量</title>
<!-- PWA：加入主畫面後全螢幕 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CC 用量">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0d0d0f">
<style>
  :root {
    --bg: #0d0d0f;
    --card: #1c1c1e;
    --track: #3a3a3c;
    --text: #f2f2f7;
    --muted: #98989f;
    --green: #30d158;
    --orange: #ff9f0a;
    --red: #ff453a;
    --weekly: #6e8cae;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "SF Pro Text", "PingFang TC", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
    padding: max(16px, env(safe-area-inset-top)) 16px 32px;
    transition: filter .4s;
  }
  body.stale { filter: saturate(.25); }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    max-width: 560px;
    margin: 0 auto 18px;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  #meta { font-size: 12px; color: var(--muted); }
  #meta .stale-flag { color: var(--red); font-weight: 700; margin-left: 6px; }
  .machine { max-width: 560px; margin: 0 auto 14px; }
  .machine h2 {
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .card .top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .card .name { font-size: 14px; font-weight: 600; }
  .card .big { font-size: 34px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .row { margin-top: 10px; }
  .row .label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .bar {
    height: 6px;
    border-radius: 3px;
    background: var(--track);
    overflow: hidden;
  }
  .bar > div { height: 100%; border-radius: 3px; transition: width .5s; }
  .resets {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
  }
  #empty {
    max-width: 560px;
    margin: 40px auto;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>
<header>
  <h1>Claude Code 用量</h1>
  <div id="meta">載入中…</div>
</header>
<main id="content"></main>
<div id="empty" hidden>尚無資料 — 請確認 GIST_RAW_URL 已設定且 agent 已執行過。</div>

<script>
// ===== 改成你的 Gist raw 連結 =====
const GIST_RAW_URL = "https://gist.githubusercontent.com/<user>/<id>/raw/usage.json";
const STALE_MINUTES = 20;
const REFRESH_MS = 60 * 1000; // 每 60 秒刷新
// ==================================

function tone(pct) {
  if (pct == null) return "var(--muted)";
  if (pct >= 90) return "var(--red)";
  if (pct >= 70) return "var(--orange)";
  return "var(--green)";
}

function relTime(iso) {
  if (!iso) return "--";
  const mins = Math.max(0, Math.floor((new Date(iso).getTime() - Date.now()) / 60000));
  if (mins < 60) return mins + "m";
  const h = Math.floor(mins / 60), m = mins % 60;
  if (mins < 1440) return m ? h + "h" + m + "m" : h + "h";
  const d = Math.floor(h / 24), hr = h % 24;
  return hr ? d + "d" + hr + "h" : d + "d";
}

function hhmm(iso) {
  const d = new Date(iso);
  if (!isFinite(d.getTime())) return "--:--";
  return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
}

function pctOf(block) {
  return block && typeof block.pct === "number" ? block.pct : null;
}

function isStale(p) {
  if (!p) return true;
  if (p.stale === true) return true;
  const t = new Date(p.updated_at).getTime();
  return !isFinite(t) || Date.now() - t > STALE_MINUTES * 60000;
}

function barRow(label, pct, color) {
  const width = Math.min(100, pct == null ? 0 : pct);
  return `
    <div class="row">
      <div class="label"><span>${label}</span><span>${pct == null ? "--" : Math.round(pct)}%</span></div>
      <div class="bar"><div style="width:${width}%;background:${color}"></div></div>
    </div>`;
}

function renderPayload(p) {
  const cc = p.claude_code;
  if (!cc) return "";
  const p5 = pctOf(cc.five_hour);
  const p7 = pctOf(cc.seven_day);
  let card = `
    <div class="card">
      <div class="top">
        <span class="name">Claude Code</span>
        <span class="big" style="color:${tone(p5)}">${p5 == null ? "--" : Math.round(p5)}%</span>
      </div>
      ${barRow("5hr", p5, tone(p5))}
      ${barRow("Weekly", p7, "var(--weekly)")}`;
  for (const [key, label] of [["seven_day_opus", "Weekly · Opus"], ["seven_day_sonnet", "Weekly · Sonnet"]]) {
    const pct = pctOf(cc[key]);
    if (pct != null) card += barRow(label, pct, "var(--weekly)");
  }
  card += `
      <div class="resets">5hr 重置於 ${relTime(cc.five_hour && cc.five_hour.resets_at)} ·
        7日 重置於 ${relTime(cc.seven_day && cc.seven_day.resets_at)}</div>
    </div>`;
  return `
    <section class="machine">
      <h2>${(p.machine || "未知機器")}</h2>
      ${card}
    </section>`;
}

async function refresh() {
  const meta = document.getElementById("meta");
  const content = document.getElementById("content");
  const empty = document.getElementById("empty");
  let data = null;
  try {
    const res = await fetch(GIST_RAW_URL + "?t=" + Date.now(), { cache: "no-store" });
    if (res.ok) data = await res.json();
  } catch (e) { /* 保留上次畫面 */ }

  if (!data || (!Array.isArray(data) && !data.claude_code)) {
    if (!content.innerHTML) { empty.hidden = false; meta.textContent = "無資料"; }
    return;
  }
  empty.hidden = true;

  const payloads = Array.isArray(data) ? data : [data]; // 支援未來多機器陣列
  content.innerHTML = payloads.map(renderPayload).join("");

  const newest = payloads[0];
  const stale = payloads.every(isStale);
  document.body.classList.toggle("stale", stale);
  meta.innerHTML = "最後更新 " + hhmm(newest.updated_at) +
    (stale ? '<span class="stale-flag">資料過期</span>' : "");
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
